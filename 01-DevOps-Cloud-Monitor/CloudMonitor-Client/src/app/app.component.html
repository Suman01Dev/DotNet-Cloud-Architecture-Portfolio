<div style="padding: 2rem; font-family: sans-serif; max-width: 800px; margin: 0 auto;">
  <h1 style="color: #2c3e50;">☁️ DevOps Cloud Monitor</h1>
  
  <p *ngIf="errorMessage()" style="color: red; background: #ffebee; padding: 10px;">{{ errorMessage() }}</p>

  <table *ngIf="containers().length > 0" style="width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <thead style="background-color: #34495e; color: white;">
      <tr>
        <th style="padding: 15px; text-align: left;">Container ID</th>
        <th style="padding: 15px; text-align: left;">Name</th>
        <th style="padding: 15px; text-align: left;">Image</th>
        <th style="padding: 15px; text-align: left;">Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of containers()" style="border-bottom: 1px solid #ddd; background: white;">
        <td style="padding: 15px; font-family: monospace; color: #7f8c8d;">{{ c.id }}</td>
        <td style="padding: 15px; font-weight: bold; color: #2980b9;">{{ c.name }}</td>
        <td style="padding: 15px; color: #555;">{{ c.image }}</td>
        <td style="padding: 15px; font-weight: bold;" 
            [style.color]="c.status === 'Running' ? '#27ae60' : '#e74c3c'">
          {{ c.status }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
